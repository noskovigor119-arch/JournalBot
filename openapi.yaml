openapi: 3.0.3
info:
  title: HomeCloud AI Services API (FoodHelper & FitBuilder)
  description: >
    Internal API contract for the LLM-driven microservices on the Docker bridge network.
    The Telegram Orchestrator Bot consumes these endpoints to fulfill user requests.
  version: 1.0.0

servers:
  - url: http://food-helper:8080
    description: FoodHelper Internal Docker DNS
  - url: http://fit-builder:8080
    description: FitBuilder Internal Docker DNS

tags:
  - name: Nutrition
    description: Endpoints hosted by the FoodHelper service
  - name: Fitness
    description: Endpoints hosted by the FitBuilder service

paths:
  /meal/plan:
    post:
      tags:
        - Nutrition
      summary: Generate a structured meal plan
      description: >
        Accepts a user's dietary preferences or current state and returns a formatted markdown meal plan via Gemini 1.5 Flash.
      operationId: generateMealPlan
      requestBody:
        description: User input from Telegram. Can be an empty string if the user triggered the default command.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRequest'
      responses:
        '200':
          description: Successfully generated meal plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResponse'
        '500':
          description: Internal AI processing error or Gemini timeout.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /workout/plan:
    post:
      tags:
        - Fitness
      summary: Generate a structured workout plan
      description: >
        Accepts a user's fitness constraints or goals and returns a formatted markdown workout plan via Gemini 1.5 Flash.
      operationId: generateWorkoutPlan
      requestBody:
        description: User input from Telegram. Can be an empty string.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanRequest'
      responses:
        '200':
          description: Successfully generated workout plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResponse'
        '500':
          description: Internal AI processing error or Gemini timeout.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    PlanRequest:
      type: object
      required:
        - userId
        - description
      properties:
        userId:
          type: string
          description: userId to pass
        description:
          type: string
          description: The raw text input provided by the user. If none, pass an empty string.
          example: "I need a high-protein vegetarian meal plan for today."

    PlanResponse:
      type: object
      required:
        - result
      properties:
        result:
          type: string
          description: The fully formatted markdown string output generated by the LLM.
          example: "**Breakfast:** 3 Scrambled Eggs...\n\n**Lunch:** Lentil Soup..."

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Safe fallback error message to return to the Telegram bot if the LLM fails.
          example: "System Error: Unable to reach Gemini API. Please try again later."